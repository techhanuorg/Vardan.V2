version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hospital-db
    restart: always
    environment:
      POSTGRES_DB: hospital_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_password_secure
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hospital-backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:production_password_secure@postgres:5432/hospital_saas?schema=public
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: production_jwt_secret_key_strong_security
      ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:3000
      AI_PROVIDER: GEMINI
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - uploads-data:/usr/src/app/uploads
      - sessions-data:/usr/src/app/sessions

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hospital-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads-data:
  sessions-data:
