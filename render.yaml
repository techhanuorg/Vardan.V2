services:
  # ----------------------------------------------------------------------------
  # BACKEND EXPRESS SERVICE
  # ----------------------------------------------------------------------------
  - type: web
    name: vardan-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vardan-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: GEMINI
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_APPS_SCRIPT_URL
        sync: false
    healthCheckPath: /api/v1/health

  # ----------------------------------------------------------------------------
  # FRONTEND STATIC REACT APP
  # ----------------------------------------------------------------------------
  - type: web
    name: vardan-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Direct all SPA routes to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ----------------------------------------------------------------------------
  # POSTGRESQL DATABASE
  # ----------------------------------------------------------------------------
  - name: vardan-db
    databaseName: hospital_saas
    user: postgres
    plan: free
