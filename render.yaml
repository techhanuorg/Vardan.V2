services:
  # ----------------------------------------------------------------------------
  # BACKEND EXPRESS SERVICE
  # ----------------------------------------------------------------------------
  - type: web
    name: vardan-backend
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npx prisma generate --schema=backend/prisma/schema.prisma && npm run build --workspace=backend
    startCommand: npm run start --workspace=backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: GEMINI
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_APPS_SCRIPT_URL
        sync: false
    healthCheckPath: /api/v1/health

  # ----------------------------------------------------------------------------
  # FRONTEND STATIC REACT APP
  # ----------------------------------------------------------------------------
  - type: web
    name: vardan-frontend
    env: static
    buildCommand: npm install --legacy-peer-deps && npm run build --workspace=frontend
    staticPublishPath: frontend/dist
    routes:
      # Direct all SPA routes to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
